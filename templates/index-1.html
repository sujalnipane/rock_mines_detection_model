<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sonar Rock vs Mine Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <div class="logo">Sonar Detector</div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
        </ul>
    </nav>

    <video autoplay muted loop class="bg-video">
        <source src="/static/back.mp4" type="video/mp4">
    </video>

    <div class="container">

        <h2>Sonar Rock vs Mine Detection</h2>
        <p>60 comma-separated values ek saath paste karo</p>

        <div class="sample-buttons">
            <button type="button" class="sample-btn" onclick="fillSample('mine')">Sample: Mine</button>
            <button type="button" class="sample-btn" onclick="fillSample('rock')">Sample: Rock</button>
            <button type="button" class="sample-btn" onclick="clearAll()">Clear</button>
        </div>

        <form id="sonarForm">
            <textarea
                id="sonar_data"
                name="sonar_data"
                placeholder="0.0200,0.0371,0.0428,...(60 values)"
                required
            ></textarea>

            <div id="count"></div>

            <button type="submit">Detect</button>
        </form>

        <div id="result"></div>

    </div>

    <script>
        const samples = {
            mine: "0.0200,0.0371,0.0428,0.0207,0.0954,0.0986,0.1539,0.1601,0.3109,0.2111,0.1609,0.1582,0.2238,0.0645,0.0660,0.2273,0.3100,0.2999,0.5078,0.4797,0.5783,0.5071,0.4328,0.5550,0.6711,0.6415,0.7104,0.8080,0.6791,0.3857,0.1307,0.2604,0.5121,0.7547,0.8537,0.8507,0.6692,0.6097,0.4943,0.2744,0.0510,0.2834,0.2825,0.4256,0.2641,0.1386,0.1051,0.1343,0.0383,0.0324,0.0232,0.0027,0.0065,0.0159,0.0072,0.0167,0.0180,0.0084,0.0090,0.0032",
            rock: "0.0286,0.0453,0.0277,0.0174,0.0384,0.0990,0.1201,0.1833,0.2105,0.3039,0.2988,0.4250,0.6343,0.8198,1.0000,0.9988,0.9508,0.9025,0.7234,0.5122,0.2074,0.3985,0.5890,0.2872,0.2043,0.5782,0.5389,0.3750,0.3411,0.5067,0.5580,0.4778,0.3299,0.2198,0.1407,0.2856,0.3807,0.4158,0.4054,0.3296,0.2707,0.2650,0.0723,0.1238,0.1192,0.1089,0.0623,0.0494,0.0264,0.0081,0.0104,0.0045,0.0014,0.0038,0.0013,0.0089,0.0057,0.0027,0.0051,0.0062"
        };

        const textarea = document.getElementById('sonar_data');
        const countDiv = document.getElementById('count');
        const resultDiv = document.getElementById('result');

        function updateCount() {
            const vals = textarea.value.split(',').map(v => v.trim()).filter(v => v !== '');
            countDiv.innerText = vals.length + ' / 60 values';
        }

        function fillSample(type) {
            textarea.value = samples[type];
            updateCount();
        }

        function clearAll() {
            textarea.value = '';
            resultDiv.innerText = '';
            updateCount();
        }

        textarea.addEventListener('input', updateCount);

        document.getElementById('sonarForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const formData = new FormData(this);

            const response = await fetch('/predict', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            resultDiv.innerText = data.result;
        });
    </script>

</body>
</html>
